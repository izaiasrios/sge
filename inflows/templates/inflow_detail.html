{% extends "base.html" %}

{% block content %}
    <div class="mt-4">
        <h3 class="display-4">Detalhes da Entrada</h3>
        <div class="card">
            <div class="card-body">
                <h3 class="card-title">{{ object.product }}</h3>
                <p class="card-text"><strong>Fornecedor:</strong> {{ object.supplier }}</p>
                <p class="card-text"><strong>Quantidade:</strong> {{ object.quantity }}</p>
                <p class="card-text">Descrição:{{ object.description }}</p>
            </div>
        </div>
        <a href="{% url 'inflow_list' %}" class="btn btn-secondary mt-2">Voltar para Lista de Entradas</a>
    </div>
{% endblock %}
