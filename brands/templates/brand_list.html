{% extends "base.html" %}

{% block title %}
SGE - Marcas
{% endblock %}

{% block content %}

  <div class="row mb-3">
    <div class="col md-6"> 
        <form method="get" action="{% url 'brand_list' %}">
            <div class="input-group">
                <input type="text" name="name" class="form-control" placeholder="Pesquisar por nome..."  style="max-width: 400px;" value="{{ request.GET.name }}">
                <div class="input-group-append">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-search"></i>
                    </button>
            </div>    
        </form>    

        <div class="col md-6 text-end">
        <a href="{% url 'brand_create' %}" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Nova Marca
        </a>
        </div>  
    </div>    
    
  <div class="table-responsive">
    <h1>Marcas</h1>
    <table class="table table-striped table-bordered">
      <thead class="thead-dark">
        <tr>
            <th>Id</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        {% for brand in brands %}
        <tr>
          <td>{{ brand.id }}</td>
          <td>{{ brand.name }}</td>
          <td>{{ brand.description }}</td>
          <td>
            <a href="{% url 'brand_detail' brand.id %}" class="btn btn-info btn-sm">
              <i class="bi bi-eye"></i>
            </a>
            <a href="{% url 'brand_update' brand.id %}" class="btn btn-warning btn-sm">
              <i class="bi bi-pencil"></i>
            </a>
            <a href="{% url 'brand_delete' brand.id %}" class="btn btn-danger btn-sm">
              <i class="bi bi-trash"></i>
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
 {% include 'components/_pagination.html' %}
{% endblock %}
