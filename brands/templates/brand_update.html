{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Atualizar Marca</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>
    <a href="{% url 'brand_list' %}" class="btn btn-secondary mt-2">Voltar para Lista de Marcas</a>
</div>
{% endblock %}
